<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="I miei Menù">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>I miei Menù</title>
<style>
:root{--bg:#fff8f3;--card:#fff;--text:#2c2522;--muted:#7a6e68;--border:#eadfd8;--accent:#ff7657;--green:#64b88f;--yellow:#ffc85a}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 90% 5%,rgba(255,200,90,.30),transparent 28%),radial-gradient(circle at 5% 22%,rgba(100,184,143,.16),transparent 25%),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif;color:var(--text);padding-bottom:112px}
header{position:relative;overflow:hidden;background:linear-gradient(135deg,#ff7354,#ff9b65 55%,#ffc15a);color:#fff;padding:calc(24px + env(safe-area-inset-top)) 18px 28px;border-radius:0 0 30px 30px;box-shadow:0 12px 28px rgba(96,49,25,.16)}
header:before,header:after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.14)}
header:before{width:170px;height:170px;right:-55px;top:-70px}
header:after{width:110px;height:110px;left:-45px;bottom:-55px}
h1{margin:0;font-size:30px;position:relative}.sub{margin-top:7px;font-size:15px;opacity:.94;position:relative}
main{max-width:760px;margin:auto;padding:18px 14px}
.day{background:rgba(255,255,255,.95);border-radius:24px;margin-bottom:16px;overflow:hidden;box-shadow:0 10px 28px rgba(65,38,24,.10);border:1px solid rgba(90,60,45,.07)}
.day h2{font-size:21px;margin:0;padding:17px 18px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#fff,#fff8f3)}
.group{padding:13px 16px 5px}.group h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 8px}
.group h3::before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;background:var(--yellow)}
.group:nth-of-type(3) h3::before{background:var(--accent)}
.group:nth-of-type(4) h3::before{background:var(--green)}
.group:nth-of-type(5) h3::before{background:#9b7bd3}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 10px;margin:0 -2px;border-radius:14px;font-size:17px;line-height:1.25;transition:.18s ease}
.option:has(input:checked){background:#fff1e8;transform:translateX(2px)}
.option br{display:none}
input{appearance:none;width:24px;height:24px;border-radius:8px;border:2px solid #d8ccc5;background:white;flex:0 0 auto;margin:0;display:grid;place-items:center}
input:checked{background:linear-gradient(135deg,var(--accent),#ff9d64);border-color:transparent}
input:checked:after{content:"✓";color:#fff;font-size:16px;font-weight:900}
.actions{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,.90);backdrop-filter:blur(18px);border-top:1px solid rgba(80,60,50,.10);display:grid;grid-template-columns:.8fr 1.2fr;gap:10px;z-index:20}
button{border:0;border-radius:16px;padding:15px 12px;font-size:16px;font-weight:800}
.primary{background:linear-gradient(135deg,var(--accent),#ff9b63);color:#fff;box-shadow:0 8px 20px rgba(255,118,87,.27)}
.secondary{background:#f0ebe7;color:#514843}
#summaryBox{display:none;background:var(--card);border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(65,38,24,.10)}
#summaryText{white-space:pre-wrap;background:#fff8f3;border-radius:17px;padding:14px;line-height:1.5;font-size:16px}
.summaryActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.shareBtn{background:linear-gradient(135deg,#64b88f,#48a477);color:white}
.copyBtn{background:#eaf1ff;color:#285dac}
.small{font-size:13px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<header><h1>🍽️ I miei Menù</h1><div class="sub">Scegli liberamente il tuo pranzo: un primo e due contorni, un secondo e due contorni oppure un menù completo con primo, secondo, contorno, pane, frutta e acqua (quando previsti).</div></header>
<main>
<section id="summaryBox"><h2>✨ Il tuo riepilogo</h2><div id="summaryText"></div><div class="summaryActions"><button class="copyBtn" id="copyBtn">📋 Copia</button><button class="shareBtn" id="shareBtn">💬 Condividi</button></div><div class="small">Le scelte vengono salvate automaticamente su questo iPhone.</div></section>
<div id="days"></div>
</main>
<div class="actions">
<button class="secondary" id="resetBtn">Azzera</button>
<button class="primary" id="summaryBtn">Crea riepilogo</button>
</div>
<script>
const menu={"Lunedì 20": {"Primo": ["Pasta integrale pomodoro e olive", "Pasta all'olio", "Pasta al pomodoro", "Riso all'olio", "Riso al pomodoro"], "Secondo": ["Merluzzo al limone", "Uova sode", "Pizza margherita", "Formaggio grana", "Spezzatino di vitello"], "Contorno": ["Spinaci", "Patate e fagiolini", "Cetrioli"]}, "Martedì 21": {"Primo": ["Risotto cremoso alle zucchine", "Pasta al pomodoro", "Pasta all'olio", "Riso all'olio", "Riso al pomodoro"], "Secondo": ["Seppioline in umido", "Bresaola", "Tortino di legumi", "Caprese (mozzarella e pomodoro)"], "Contorno": ["Broccoli", "Insalata", "Misto di verdure grigliate"]}, "Mercoledì 22": {"Primo": ["Gnocchetti al pesto di zucchine", "Riso al pomodoro", "Pasta al pomodoro", "Riso all'olio", "Pasta all'olio", "Minestrone con riso"], "Secondo": ["Platessa gratinata", "Taleggio", "Tortino di ceci", "Mortadella", "Fettine di tacchino alla valdostana"], "Contorno": ["Fagiolini", "Carote cotte", "Insalata verde e rossa"]}, "Giovedì 23": {"Primo": ["Insalata di riso", "Pasta all'olio", "Pasta al pomodoro", "Riso al pomodoro", "Riso all'olio"], "Secondo": ["Fusi di pollo", "Crescenza", "Speck", "Piatto freddo", "Hamburger di verdure"], "Contorno": ["Cavolfiore gratinato", "Fagiolini", "Carote julienne"]}, "Venerdì 24": {"Primo": ["Ravioli di magro", "Pasta pomodoro e ricotta", "Riso all'olio", "Pasta all'olio", "Riso al pomodoro", "Pasta al pomodoro", "Passato di verdure e legumi con orzo"], "Secondo": ["Frittata", "Lenticchie al pomodoro", "Pollo pomodoro e olive", "Formaggio brie", "Tonno alla mediterranea"], "Contorno": ["Tris di verdure al forno", "Zucchine al forno", "Barbabietole"]}};
const daysEl=document.getElementById('days');
const saved=JSON.parse(localStorage.getItem('menuChoices')||'{}');

for(const [day,groups] of Object.entries(menu)){
  const card=document.createElement('section'); card.className='day';
  card.innerHTML=`<h2>${day}</h2>`;
  for(const [group,items] of Object.entries(groups)){
    const wrap=document.createElement('div'); wrap.className='group';
    wrap.innerHTML=`<h3>${group}</h3>`;
    items.forEach(item=>{
      const id=btoa(unescape(encodeURIComponent(day+'|'+group+'|'+item))).replace(/=/g,'');
      const label=document.createElement('label'); label.className='option';
      label.innerHTML=`<input type="checkbox" id="${id}" data-day="${day}" data-group="${group}" data-item="${item}"><span>${item}</span>`;
      const cb=label.querySelector('input');
      cb.checked=!!saved[id];
      cb.addEventListener('change',saveChoices);
      wrap.appendChild(label);
    });
    card.appendChild(wrap);
  }
  daysEl.appendChild(card);
}

function saveChoices(){
  const state={};
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{if(cb.checked) state[cb.id]=true;});
  localStorage.setItem('menuChoices',JSON.stringify(state));
}

function makeSummary(){
  let text='';
  for(const day of Object.keys(menu)){
    const selected=[...document.querySelectorAll(`input[data-day="${day}"]:checked`)];
    if(selected.length){
      text+=day+'\n';
      selected.forEach(cb=>text+=`• ${cb.dataset.group}: ${cb.dataset.item}\n`);
      text+='\n';
    }
  }
  document.getElementById('summaryText').textContent=text||'Non hai ancora selezionato nulla.';
  document.getElementById('summaryBox').style.display='block';
  document.getElementById('summaryBox').scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('summaryBtn').addEventListener('click',()=>makeSummary());
document.getElementById('copyBtn').addEventListener('click',async()=>{
  const text=document.getElementById('summaryText').textContent;
  try{await navigator.clipboard.writeText(text); document.getElementById('copyBtn').textContent='✓ Copiato'; setTimeout(()=>document.getElementById('copyBtn').textContent='📋 Copia',1400);}catch(e){}
});
document.getElementById('shareBtn').addEventListener('click',async()=>{
  const text=document.getElementById('summaryText').textContent;
  if(navigator.share){await navigator.share({title:'I miei Menù',text});}
  else{window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');}
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('Vuoi cancellare tutte le scelte?')){
    document.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
    localStorage.removeItem('menuChoices');
    document.getElementById('summaryBox').style.display='none';
  }
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js');
</script>
</body>
</html>
